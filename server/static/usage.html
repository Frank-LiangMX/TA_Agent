<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAgent 用量统计</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #333; margin-bottom: 20px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card-title { font-size: 14px; color: #666; margin-bottom: 8px; }
        .card-value { font-size: 32px; font-weight: bold; color: #1890ff; }
        .card-value.warning { color: #faad14; }
        .card-value.danger { color: #ff4d4f; }
        table { width: 100%; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 600; color: #333; }
        tr:hover { background: #f5f5f5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .badge-ok { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
        .badge-warning { background: #fffbe6; color: #faad14; border: 1px solid #ffe58f; }
        .badge-danger { background: #fff2f0; color: #ff4d4f; border: 1px solid #ffccc7; }
        .progress { height: 8px; background: #f0f0f0; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .progress-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
        .progress-ok { background: #52c41a; }
        .progress-warning { background: #faad14; }
        .progress-danger { background: #ff4d4f; }
        .refresh-btn { padding: 8px 16px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-bottom: 16px; }
        .refresh-btn:hover { background: #40a9ff; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TAgent 用量统计</h1>
        <button class="refresh-btn" onclick="loadData()">刷新数据</button>

        <div class="cards" id="summary-cards">
            <div class="card">
                <div class="card-title">总用户数</div>
                <div class="card-value" id="total-users">-</div>
            </div>
            <div class="card">
                <div class="card-title">今日调用次数</div>
                <div class="card-value" id="total-calls-today">-</div>
            </div>
            <div class="card">
                <div class="card-title">今日 Token 消耗</div>
                <div class="card-value" id="total-tokens-today">-</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>用户</th>
                    <th>5小时内调用</th>
                    <th>剩余配额</th>
                    <th>今日调用</th>
                    <th>今日 Token</th>
                    <th>总调用</th>
                    <th>总 Token</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="user-table">
                <tr><td colspan="8" class="loading">加载中...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_BASE = window.location.origin;

        async function loadData() {
            try {
                const res = await fetch(`${API_BASE}/api/usage/stats`);
                const data = await res.json();
                renderSummary(data);
                renderTable(data.users);
            } catch (err) {
                console.error('加载失败:', err);
            }
        }

        function renderSummary(data) {
            document.getElementById('total-users').textContent = data.total_users;
            document.getElementById('total-calls-today').textContent = data.total_calls_today;
            document.getElementById('total-tokens-today').textContent = formatTokens(data.total_tokens_today);
        }

        function renderTable(users) {
            const tbody = document.getElementById('user-table');
            if (!users || users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="loading">暂无数据</td></tr>';
                return;
            }

            tbody.innerHTML = users.map(user => {
                const usagePercent = (user.call_count_5h / user.limit_5h) * 100;
                const status = getStatus(user.remaining_5h, user.limit_5h);
                const progressClass = getProgressClass(usagePercent);

                return `
                    <tr>
                        <td><strong>${user.user_id}</strong></td>
                        <td>${user.call_count_5h}</td>
                        <td>
                            ${user.remaining_5h} / ${user.limit_5h}
                            <div class="progress">
                                <div class="progress-bar ${progressClass}" style="width: ${usagePercent}%"></div>
                            </div>
                        </td>
                        <td>${user.call_count_today}</td>
                        <td>${formatTokens(user.tokens_today)}</td>
                        <td>${user.call_count_total}</td>
                        <td>${formatTokens(user.tokens_total)}</td>
                        <td><span class="badge ${status.class}">${status.text}</span></td>
                    </tr>
                `;
            }).join('');
        }

        function getStatus(remaining, limit) {
            const percent = (remaining / limit) * 100;
            if (percent <= 0) return { class: 'badge-danger', text: '已超限' };
            if (percent <= 20) return { class: 'badge-warning', text: '即将超限' };
            return { class: 'badge-ok', text: '正常' };
        }

        function getProgressClass(percent) {
            if (percent >= 100) return 'progress-danger';
            if (percent >= 80) return 'progress-warning';
            return 'progress-ok';
        }

        function formatTokens(tokens) {
            if (tokens >= 1000000) return (tokens / 1000000).toFixed(1) + 'M';
            if (tokens >= 1000) return (tokens / 1000).toFixed(1) + 'K';
            return tokens;
        }

        // 每 30 秒自动刷新
        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
