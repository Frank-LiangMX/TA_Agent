appId: com.tagent.desktop
productName: TAgent
directories:
  output: ../../release/electron
files:
  - main.js
  - preload.js
  - updater.js
  - wechat/**/*
  - assets/**/*
  - dist/**/*
extraResources:
  - from: ../../release/pyinstaller/TAgent
    to: backend
    filter:
      - "**/*"
win:
  target:
    - target: nsis
    - target: dir
  icon: assets/icon.ico
  # 必须跟 latest.yml 里的 files[].url 格式一致，否则 electron-updater 找不到下载文件
  # electron-updater 默认期望 ${productName}-Setup-${version}.${ext}（连字符）
  artifactName: ${productName}-Setup-${version}.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TAgent
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  installerSidebar: assets/installer-sidebar.bmp
  uninstallerSidebar: assets/uninstaller-sidebar.bmp
  installerLanguages:
    - zh_CN
  language: 2052
  unicode: true
publish:
  provider: github
  owner: Frank-LiangMX
  repo: TA_Agent
